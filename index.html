<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdoHub - Store Top Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.15), transparent 25%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Latar belakang partikel sederhana */
        .background-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00f2fe;
            filter: blur(150px);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
            100% { transform: translateY(0px) scale(1); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            text-align: center;
            
            /* Efek Glassmorphism */
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            
            /* Teks Gradient Neon */
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-btn:hover {
            background: #00f2fe;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        /* Responsif untuk layar HP */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .container { padding: 30px 20px; }
            p { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="container">
        <div class="badge">🚀 COMING SOON</div>
        <h1>Naitsugaaa<br>Top-Up Store</h1>
        <p>Destinasi top-up game favoritmu sedang dibangun. Kami merancang sistem otomatis agar pengalaman belanjamu super cepat, aman, dan tanpa ribet.</p>
        
        <div class="social-icons">
            <!-- Ikon dummy, nanti bisa diganti link medsos kamu -->
            <a href="#" class="social-btn">IG</a>
            <a href="#" class="social-btn">FB</a>
            <a href="#" class="social-btn">WA</a>
        </div>
    </div>
</body>
</html>
