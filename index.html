<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdoHub - Coming Soon</title>
    <!-- Menggunakan Plus Jakarta Sans, font favorit untuk UI modern -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #09090b;
            --card-bg: #18181b;
            --card-border: #27272a;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --btn-hover: #27272a;
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Layout Utama - Fokus Sentral */
        .wrapper {
            width: 100%;
            max-width: 420px; /* Ukuran optimal agar mata tidak lelah membaca ke samping */
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* Bagian Header */
        .header {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            padding: 6px 14px;
            background-color: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 100px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Bagian Tombol (Hick's Law: Disusun Vertikal agar pilihan mudah disaring) */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .link-card:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
            border-color: #3f3f46;
        }

        .link-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* Ikon SVG */
        .icon-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #27272a;
            border-radius: 10px;
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .link-text {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Panah kecil di kanan */
        .arrow {
            color: var(--text-muted);
        }

    </style>
</head>
<body>
